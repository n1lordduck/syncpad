name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            wget \
            file

      - name: Run GoReleaser (build binary)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build AppImage
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          BINARY=$(find dist -name "syncpad" -type f | head -1)
          APPDIR="dist/AppDir"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/32x32/apps"

          cp "$BINARY" "$APPDIR/usr/bin/syncpad"
          chmod +x "$APPDIR/usr/bin/syncpad"

          cp assets/tray.png "$APPDIR/usr/share/icons/hicolor/32x32/apps/syncpad.png"
          cp assets/logo.png "$APPDIR/syncpad.png"

          cat > "$APPDIR/syncpad.desktop" << DESKTOP
          [Desktop Entry]
          Name=SyncPad
          Exec=syncpad
          Icon=syncpad
          Type=Application
          Categories=Utility;
          DESKTOP

          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE="${SELF%/*}"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/syncpad" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # Extract appimagetool to avoid needing FUSE on the runner
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool.AppImage
          chmod +x /tmp/appimagetool.AppImage
          cd /tmp && /tmp/appimagetool.AppImage --appimage-extract
          cd $GITHUB_WORKSPACE

          ARCH=x86_64 /tmp/squashfs-root/AppRun --no-appstream \
            "$APPDIR" "dist/syncpad_${TAG}_linux_x86_64.AppImage"

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/syncpad_${{ github.ref_name }}_linux_x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}